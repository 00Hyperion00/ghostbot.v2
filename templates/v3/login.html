<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kurumsal Giriş</title><link rel="stylesheet" href="{{ url_for('enterprise_v3.static', filename='v3.css') }}"></head><body class="login-page"><form class="login-card" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><h1>Sürekli Denetim Merkezi</h1><p>Kurumsal v{{ v3_version }}</p>{% with messages=get_flashed_messages(with_categories=true) %}{% for category,message in messages %}<div class="alert {{ category }}">{{ message }}</div>{% endfor %}{% endwith %}<label>Kullanıcı adı<input name="username" autocomplete="username" required autofocus></label><label>Parola<input type="password" name="password" autocomplete="current-password" required></label><button type="submit">Güvenli Giriş</button></form></body></html>
