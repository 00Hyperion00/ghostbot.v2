[pytest]
testpaths =
    tests
python_files =
    test_*.py
norecursedirs =
    .git
    .hg
    .svn
    .tox
    .venv
    venv
    env
    build
    dist
    .eggs
    *.egg
    _patch_backup*
    _patch_payload*
    legacy_patches
addopts =
    -ra
    --import-mode=importlib
    --ignore-glob=tools/_patch_backup_*
    --ignore-glob=tools/_patch_payload_*
    --ignore=legacy_patches
    --ignore-glob=**/_patch_backup_*
    --ignore-glob=**/_patch_payload_*
    --ignore-glob=**/legacy_patches
